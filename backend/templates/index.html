<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Futsal Bracket App</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="container">
      <h1>Futsal Bracket App</h1>
      <p class="subtitle">Dashboard awal untuk tim dan pertandingan futsal</p>
    </div>
  </header>

  <main class="container">
    <section class="card hero-card">
      <div>
        <h2>Manajemen Turnamen</h2>
        <p>Tambah tim, buat pertandingan, dan lihat data turnamen dari satu halaman.</p>
      </div>
      <button id="refreshBtn" class="btn">Refresh Semua</button>
    </section>

    <section class="grid-two">
      <div class="card">
        <h3>Tambah Tim</h3>
        <form id="teamForm" class="team-form">
          <div class="form-group">
            <label for="teamName">Nama Tim</label>
            <input type="text" id="teamName" name="name" placeholder="Contoh: Garuda FC" required>
          </div>

          <div class="form-group">
            <label for="teamCategory">Kategori</label>
            <input type="text" id="teamCategory" name="category" placeholder="Contoh: Senior" required>
          </div>

          <button type="submit" class="btn">Simpan Tim</button>
        </form>

        <div id="formMessage" class="status hidden"></div>
      </div>

      <div class="card">
        <h3>Tambah Match</h3>
        <form id="matchForm" class="team-form">
          <div class="form-group">
            <label for="roundName">Round</label>
            <input type="text" id="roundName" placeholder="Contoh: Semi Final" required>
          </div>

          <div class="form-group">
            <label for="matchCode">Match Code</label>
            <input type="text" id="matchCode" placeholder="Contoh: SF-1" required>
          </div>

          <div class="form-group">
            <label for="team1Select">Team 1</label>
            <select id="team1Select" required></select>
          </div>

          <div class="form-group">
            <label for="team2Select">Team 2</label>
            <select id="team2Select" required></select>
          </div>

          <button type="submit" class="btn">Simpan Match</button>
        </form>

        <div id="matchMessage" class="status hidden"></div>
      </div>
    </section>

    <section class="grid-two">
      <div class="card">
        <div class="section-head">
          <h3>Daftar Tim</h3>
          <span id="teamCount" class="badge">0 tim</span>
        </div>

        <div id="statusMessage" class="status">Memuat data tim...</div>
        <div id="teamList" class="team-list"></div>
      </div>

      <div class="card">
        <div class="section-head">
          <h3>Daftar Match</h3>
          <span id="matchCount" class="badge">0 match</span>
        </div>

        <div id="matchStatusMessage" class="status">Memuat data match...</div>
        <div id="matchList" class="team-list"></div>
      </div>
    </section>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
